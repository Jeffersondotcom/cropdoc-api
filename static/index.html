<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GreenDoc AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-logo">
                <i data-lucide="leaf"></i>
                <span>GreenDoc</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="app-main" id="main-content">
            
            <!-- HOME VIEW -->
            <section id="view-home" class="view-section active">
                <div class="hero">
                    <h1 class="hero-title">Diagnose.<br>Treat.<br>Grow.</h1>
                    <p class="hero-subtitle">AI-powered crop disease detection for African farmers.</p>
                </div>
                
                <div class="home-illustration">
                    <div class="illus-circle">
                        <i data-lucide="sprout"></i>
                    </div>
                </div>
            </section>

            <!-- SCAN VIEW -->
            <section id="view-scan" class="view-section">
                <div class="scan-container">
                    <h2 class="section-title">Scan Crop</h2>
                    <p class="section-desc">Take a clear photo of the affected crop leaf.</p>
                    
                    <!-- Default Scan Prompt -->
                    <div id="scan-prompt" class="scan-card">
                        <div class="scan-actions">
                            <button class="action-btn camera-btn" id="btn-open-camera">
                                <i data-lucide="camera"></i>
                                <span>Camera</span>
                            </button>
                            <button class="action-btn upload-btn" id="btn-open-gallery">
                                <i data-lucide="upload"></i>
                                <span>Upload</span>
                            </button>
                        </div>
                    </div>

                    <!-- Image Preview Area (hidden initially) -->
                    <div id="scan-preview" class="scan-card hidden">
                        <div class="preview-wrapper">
                            <img id="preview-image" src="" alt="Crop Preview">
                        </div>
                        <div class="preview-actions">
                            <button class="btn-secondary" id="btn-retake">Retake</button>
                            <button class="btn-primary" id="btn-confirm-scan">Diagnose</button>
                        </div>
                    </div>

                    <!-- Results Area (hidden initially) -->
                    <div id="scan-result" class="results-container hidden">
                        <div class="result-card">
                            <div class="result-header">
                                <h3 id="result-disease">Tomato Blight</h3>
                                <span id="result-severity" class="severity-badge">High</span>
                            </div>
                            
                            <div class="confidence-circle-wrapper">
                                <div class="confidence-circle" id="confidence-circle">
                                    <span class="confidence-value" id="confidence-value">95%</span>
                                </div>
                                <span class="confidence-label">Confidence</span>
                            </div>
                        </div>

                        <div class="treatment-card">
                            <h4><i data-lucide="shield-check"></i> Treatment Plan</h4>
                            <p id="result-treatment">Apply copper-based fungicide...</p>
                        </div>
                        
                        <button class="btn-primary btn-full" id="btn-new-scan">Scan Another Crop</button>
                    </div>

                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-home">
                <i data-lucide="home"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" data-target="view-scan">
                <i data-lucide="scan-line"></i>
                <span>Scan</span>
            </button>
        </nav>

        <!-- Loading Overlay -->
        <div class="loading-overlay hidden" id="loading-overlay">
            <div class="loader"></div>
            <p>Analyzing your crop...</p>
        </div>

        <!-- Hidden Inputs -->
        <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
        <input type="file" id="gallery-input" accept="image/*" hidden>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
